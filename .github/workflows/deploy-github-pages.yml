# Sitio estático en GitHub Pages: https://<usuario>.github.io/<repo>/
# El frontend principal está en Cloudflare Pages; este workflow NO corre en cada push
# para evitar checks fallidos si Pages no está configurado. Ejecutar a mano si lo necesitas:
# Actions → Deploy GitHub Pages → Run workflow.
name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        env:
          # Debe coincidir con el nombre del repo en GitHub (ruta del sitio Pages).
          VITE_BASE_PATH: /omeClone/
          VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL }}
        run: npm ci && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
