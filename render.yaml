# Blueprint Render: https://render.com/docs/infrastructure-as-code
#
# omeclone-api: tras el primer deploy, en el panel añade DATABASE_URL (Neon) si sync: false.
# omeclone-web: añade VITE_BACKEND_URL = URL pública del API (HTTPS, sin barra final).
#
# Tras cambios en el front, si sigues viendo UI vieja (p. ej. botón Facebook ya eliminado en código):
# Dashboard → servicio static omeclone-web → Headers (docs: render.com/docs/static-site-headers):
#   Path: /      Name: Cache-Control  Value: no-cache, no-store, must-revalidate
#   Path: /index.html  (mismo header)
# Luego Clear build cache + Manual Deploy del sitio estático.

services:
  - type: web
    name: omeclone-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: omeclone-web
    runtime: static
    rootDir: frontend
    # Render suele tener NODE_ENV=production; npm ci entonces OMITE devDependencies y falla vite/tsc/cross-env.
    # Forzar dev-deps e inyectar VITE_BASE_PATH sin cross-env:
    buildCommand: npm ci --include=dev && env VITE_BASE_PATH=/ npm run build
    # Con rootDir: frontend, la ruta de publicación es respecto a ese directorio (no ./frontend/dist).
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_BACKEND_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
